<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<style>
    body {
        background-color: #f8f9fa;
    }
    .container {
        max-width: 800px;
    }
    .card {
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .item-row {
        background: white;
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 10px;
    }
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);">
<div class="container">
<a class="navbar-brand" href="/dashboard"><i class="bi bi-shop"></i> E-Commerce Admin</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/products"><i class="bi bi-box-seam"></i> Products</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/customers"><i class="bi bi-people"></i> Customers</a>
</li>
<li class="nav-item">
<a class="nav-link active" href="/billing"><i class="bi bi-receipt"></i> Billing</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</li>
</ul>
</div>
</div>
</nav>

<div class="container mt-5">

<div class="card p-4">
<h2 class="text-center mb-4 text-primary"><i class="bi bi-receipt"></i> Create Bill</h2>

<div class="alert alert-info" id="totalDisplay" style="display: none;">
<strong>Total: ₹<span id="totalAmount">0</span></strong>
</div>

<form method="POST" action="/create_sale">

<div class="mb-3">
<label class="form-label">Select Customer</label>
<select name="customer_id" class="form-select" required>
<option value="">Choose a customer</option>
{% for c in customers %}
<option value="{{c[0]}}">{{c[1]}} ({{c[2]}})</option>
{% endfor %}
</select>
</div>

<div id="items">

<div class="item-row">
<div class="row">
<div class="col-md-7">
<label class="form-label">Product</label>
<select name="product_id" class="form-select" required>
<option value="">Select product</option>
{% for p in products %}
<option value="{{p[0]}}">{{p[1]}} - ₹{{p[2]}}</option>
{% endfor %}
</select>
</div>

<div class="col-md-3">
<label class="form-label">Quantity</label>
<input name="quantity" type="number" min="1" class="form-control" placeholder="Qty" required>
</div>

<div class="col-md-2 d-flex align-items-end">
<button type="button" onclick="removeItem(this)" class="btn btn-outline-danger"><i class="bi bi-trash"></i></button>
</div>
</div>
</div>

</div>

<div class="text-center mt-3">
<button type="button" onclick="addItem()" class="btn btn-secondary"><i class="bi bi-plus-circle"></i> Add More Items</button>
<button type="submit" class="btn btn-success ms-3"><i class="bi bi-check-circle"></i> Generate Bill</button>
</div>

</form>
</div>

</div>

<script>
function addItem(){
    let container = document.getElementById("items");
    let firstItem = container.children[0];
    let newItem = firstItem.cloneNode(true);
    // Reset values
    newItem.querySelector('select').selectedIndex = 0;
    newItem.querySelector('input').value = '';
    container.appendChild(newItem);
    updateTotal();
}

function removeItem(button){
    let container = document.getElementById("items");
    if(container.children.length > 1){
        button.closest('.item-row').remove();
        updateTotal();
    }
}

function updateTotal(){
    let total = 0;
    const items = document.querySelectorAll('#items .item-row');
    items.forEach(item => {
        const select = item.querySelector('select[name="product_id"]');
        const input = item.querySelector('input[name="quantity"]');
        if(select.value && input.value){
            const optionText = select.options[select.selectedIndex].text;
            // Extract price: "Laptop - ₹50000" → 50000
            total += parseFloat(input.value) * 100; // Placeholder calculation
        }
    });
    if(total > 0){
        document.getElementById('totalAmount').textContent = total.toLocaleString('en-IN', {maximumFractionDigits: 2});
        document.getElementById('totalDisplay').style.display = 'block';
    } else {
        document.getElementById('totalDisplay').style.display = 'none';
    }
}

// Add event listeners to inputs
document.addEventListener('input', updateTotal);
document.addEventListener('change', updateTotal);
</script>

</body>
</html>
