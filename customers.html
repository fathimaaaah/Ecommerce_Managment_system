<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<style>
    body {
        background-color: #f8f9fa;
    }
    .container {
        max-width: 1000px;
    }
    .card {
        border-radius: 15px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .table th {
        background-color: #007bff;
        color: white;
    }
    .btn-sm {
        margin: 2px;
    }
</style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);">
<div class="container">
<a class="navbar-brand" href="/dashboard"><i class="bi bi-shop"></i> E-Commerce Admin</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item">
<a class="nav-link" href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/products"><i class="bi bi-box-seam"></i> Products</a>
</li>
<li class="nav-item">
<a class="nav-link active" href="/customers"><i class="bi bi-people"></i> Customers</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/billing"><i class="bi bi-receipt"></i> Billing</a>
</li>
<li class="nav-item">
<a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</li>
</ul>
</div>
</div>
</nav>
<div class="container mt-5">

<div class="card p-4">
<h2 class="text-center mb-4 text-primary"><i class="bi bi-people"></i> Customers</h2>

<div class="mb-3">
<button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addCustomerModal"><i class="bi bi-person-plus"></i> Add Customer</button>
<a href="/dashboard" class="btn btn-secondary ms-3"><i class="bi bi-arrow-left"></i> Back to Dashboard</a>
</div>

<table class="table table-striped">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Phone</th>
<th>Email</th>
<th>Address</th>
<th>Actions</th>
</tr>
</thead>
<tbody>
{% for c in customers %}
<tr>
<td>{{c[0]}}</td>
<td>{{c[1]}}</td>
<td>{{c[2]}}</td>
<td>{{c[3]}}</td>
<td>{{c[4]}}</td>
<td>
<a href="/delete_customer/{{c[0]}}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure?')"><i class="bi bi-trash"></i> Delete</a>
</td>
</tr>
{% endfor %}
</tbody>
</table>
</div>

<!-- Add Customer Modal -->
<div class="modal fade" id="addCustomerModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Add New Customer</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form method="POST" action="/add_customer">
<div class="modal-body">
<div class="mb-3">
<label class="form-label">Name</label>
<input name="name" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Phone</label>
<input name="phone" type="tel" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input name="email" type="email" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Address</label>
<textarea name="address" class="form-control" required></textarea>
</div>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button type="submit" class="btn btn-primary">Add Customer</button>
</div>
</form>
</div>
</div>
</div>

<!-- Edit Customer Modal -->
<div class="modal fade" id="editCustomerModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title">Edit Customer</h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<form method="POST" action="/update_customer">
<input type="hidden" name="id" id="editCustomerId">
<div class="modal-body">
<div class="mb-3">
<label class="form-label">Name</label>
<input name="name" id="editCustomerName" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Phone</label>
<input name="phone" id="editCustomerPhone" type="tel" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input name="email" id="editCustomerEmail" type="email" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Address</label>
<textarea name="address" id="editCustomerAddress" class="form-control" required></textarea>
</div>
</div>
<div class="modal-footer">
<button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
<button type="submit" class="btn btn-primary">Update Customer</button>
</div>
</form>
</div>
</div>
</div>

<script>
function setEditCustomer(id, name, phone, email, address) {
    document.getElementById('editCustomerId').value = id;
    document.getElementById('editCustomerName').value = name;
    document.getElementById('editCustomerPhone').value = phone;
    document.getElementById('editCustomerEmail').value = email;
    document.getElementById('editCustomerAddress').value = address;
}
</script>


</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
